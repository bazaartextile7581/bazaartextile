// ---- Deep merge helper ----
function deepSet(obj, path, val) {
  if (typeof path === "string") return { ...obj, [path]: val };
  if (Array.isArray(path) && path.length === 1) return { ...obj, [path[0]]: val };
  if (Array.isArray(path) && path.length >= 2) {
    const [k, ...rest] = path;
    if (typeof k === "number") {
      const arr = Array.isArray(obj) ? [...obj] : [...(obj||[])];
      arr[k] = deepSet(arr[k], rest, val);
      return arr;
    }
    return { ...obj, [k]: deepSet(obj[k], rest, val) };
  }
  return val;
}

async function supabaseRequest(cfg, method, path, body) {
  const res = await fetch(`${cfg.url}/rest/v1/${path}`, {
    method,
    headers: {
      "apikey": cfg.anonKey,
      "Authorization": `Bearer ${cfg.anonKey}`,
      "Content-Type": "application/json",
      "Prefer": method==="POST"?"resolution=merge-duplicates,return=representation":"return=representation"
    },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  return res.json();
}

// ════════════════════════════════════════════════
//  ADMIN AUTH MODULE
//  - Default account: admin / basha2025 (auto-seeded)
//  - Password stored as SHA-256 hash, never plaintext
//  - Synced to Supabase table `bizcard_admin` so login
//    works the same across all devices/browsers
//  - Falls back to localStorage when offline / no Supabase
// ════════════════════════════════════════════════
const ADMIN_SESSION_KEY = "bizcard_admin_session";
const ADMIN_LOCAL_KEY = "bizcard_admin_local";
const DEFAULT_ADMIN_USERNAME = "admin";
const DEFAULT_ADMIN_PASSWORD = "basha2025";

async function sha256Hex(text) {
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

function getLocalAdmin() {
  try {
    const raw = localStorage.getItem(ADMIN_LOCAL_KEY);
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}
function setLocalAdmin(rec) {
  try { localStorage.setItem(ADMIN_LOCAL_KEY, JSON.stringify(rec)); } catch {}
}

// Ensure the default admin account exists, both locally and in Supabase.
// Safe to call multiple times — uses upsert semantics.
async function ensureAdminSeeded(cfg) {
  const passHash = await sha256Hex(DEFAULT_ADMIN_PASSWORD);
  const localRec = getLocalAdmin();
  if (!localRec) {
    setLocalAdmin({ username: DEFAULT_ADMIN_USERNAME, passHash, updated_at: new Date().toISOString() });
  }
  if (!cfg) return;
  try {
    const rows = await supabaseRequest(cfg, "GET", `bizcard_admin?username=eq.${encodeURIComponent(DEFAULT_ADMIN_USERNAME)}&select=username`);
    if (!rows || rows.length === 0) {
      await supabaseRequest(cfg, "POST", "bizcard_admin", {
        username: DEFAULT_ADMIN_USERNAME,
        pass_hash: passHash,
        updated_at: new Date().toISOString()
      });
    }
  } catch (e) {
    // Table might not exist yet, or offline — local fallback still works.
    console.warn("Admin seed to Supabase skipped:", e.message || e);
  }
}

// Fetch the admin record from Supabase (source of truth across devices),
// falling back to the local copy if the cloud is unreachable.
async function fetchAdminRecord(cfg, username) {
  if (cfg) {
    try {
      const rows = await supabaseRequest(cfg, "GET", `bizcard_admin?username=eq.${encodeURIComponent(username)}&select=username,pass_hash`);
      if (rows && rows.length > 0) {
        return { username: rows[0].username, passHash: rows[0].pass_hash };
      }
    } catch (e) {
      console.warn("Fetch admin from Supabase failed, using local copy:", e.message || e);
    }
  }
  const local = getLocalAdmin();
  if (local && local.username === username) return local;
  return null;
}

async function verifyAdminLogin(cfg, username, password) {
  await ensureAdminSeeded(cfg);
  const rec = await fetchAdminRecord(cfg, username.trim());
  if (!rec) return { ok: false, error: "用户名不存在" };
  const hash = await sha256Hex(password);
  if (hash !== rec.passHash) return { ok: false, error: "密码错误" };
  return { ok: true };
}

async function changeAdminPassword(cfg, username, newPassword) {
  const passHash = await sha256Hex(newPassword);
  setLocalAdmin({ username, passHash, updated_at: new Date().toISOString() });
  if (cfg) {
    try {
      await supabaseRequest(cfg, "POST", "bizcard_admin", {
        username, pass_hash: passHash, updated_at: new Date().toISOString()
      });
      return true;
    } catch (e) {
      console.warn("Sync new password to Supabase failed:", e.message || e);
      return false;
    }
  }
  return true;
}

// ---- Data hook ----
function useCardData(activeEmployeeId) {
  // Shared company data (sections 4-13) from the base STORAGE_KEY
  const [sharedData, setSharedData] = ue.useState(() => {
    try {
      const s = localStorage.getItem(STORAGE_KEY);
      if (s) return { ...DEFAULT_DATA, ...JSON.parse(s) };
    } catch {}
    return DEFAULT_DATA;
  });

  // Per-employee personal data (name, title, dept, avatar, phone, email, addr, btns)
  const [empData, setEmpData] = ue.useState(() => {
    if (!activeEmployeeId) return null;
    return loadEmployeeData(activeEmployeeId);
  });

  // When activeEmployeeId changes, reload personal data
  ue.useEffect(() => {
    if (!activeEmployeeId) { setEmpData(null); return; }
    setEmpData(loadEmployeeData(activeEmployeeId));
  }, [activeEmployeeId]);

  // Merged view: employee personal fields override shared defaults
  const data = ue.useMemo(() => {
    if (!empData) return sharedData;
    const merged = { ...sharedData };
    EMPLOYEE_PERSONAL_FIELDS.forEach(f => {
      if (empData[f] !== undefined) merged[f] = empData[f];
    });
    return merged;
  }, [sharedData, empData]);

  const [saveStatus, setSaveStatus] = ue.useState("saved");
  const [syncStatus, setSyncStatus] = ue.useState("idle");
  const [supabaseCfg, setSupabaseCfg] = ue.useState(getSupabaseConfig);

  // Load from Supabase when cloud config or active employee changes.
  ue.useEffect(() => {
    if (!supabaseCfg) return;
    setSyncStatus("syncing");
    const cloudCardId = activeEmployeeId || supabaseCfg.cardId || "default";
    supabaseRequest(supabaseCfg, "GET", `bizcard_data?card_id=eq.${encodeURIComponent(cloudCardId)}&select=data`)
      .then(rows => {
        if (rows && rows.length > 0 && rows[0].data) {
          const remote = typeof rows[0].data === "string" ? JSON.parse(rows[0].data) : rows[0].data;
          setSharedData(d => ({ ...DEFAULT_DATA, ...d, ...remote }));
          if (activeEmployeeId) {
            const personal = {};
            EMPLOYEE_PERSONAL_FIELDS.forEach(f => { if (remote[f] !== undefined) personal[f] = remote[f]; });
            personal.cardId = activeEmployeeId;
            saveEmployeeData(activeEmployeeId, personal);
            setEmpData(personal);
          }
          setSyncStatus("synced");
        } else { setSyncStatus("synced"); }
      })
      .catch(() => setSyncStatus("error"));
  }, [supabaseCfg, activeEmployeeId]);

  const update = ue.useCallback((path, val) => {
    const fieldName = Array.isArray(path) ? path[0] : path;
    const isPersonal = EMPLOYEE_PERSONAL_FIELDS.includes(fieldName);
    if (isPersonal && activeEmployeeId) {
      setEmpData(d => deepSet({ ...(d||{}) }, path, val));
    } else {
      setSharedData(d => deepSet({ ...d }, path, val));
    }
    setSaveStatus("unsaved");
  }, [activeEmployeeId]);

  const save = ue.useCallback(async (currentData) => {
    const cardId = activeEmployeeId || supabaseCfg?.cardId || currentData.cardId || "default";
    const d = { ...currentData, qrLink: getShareLink(cardId) };
    setSaveStatus("saving");
    try {
      // Save shared (company) data
      const sharedToSave = { ...d };
      EMPLOYEE_PERSONAL_FIELDS.forEach(f => delete sharedToSave[f]);
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ ...sharedData, ...sharedToSave }));
      setSharedData(prev => ({ ...prev, ...sharedToSave }));

      // Save per-employee personal data
      if (activeEmployeeId) {
        const personalToSave = {};
        EMPLOYEE_PERSONAL_FIELDS.forEach(f => { if (d[f] !== undefined) personalToSave[f] = d[f]; });
        personalToSave.cardId = activeEmployeeId;
        saveEmployeeData(activeEmployeeId, personalToSave);
        setEmpData(personalToSave);
      }

      // Sync to Supabase if configured
      if (supabaseCfg) {
        setSyncStatus("syncing");
        try {
          // Sync the full merged card for this employee's cardId
          await supabaseRequest(supabaseCfg, "POST", "bizcard_data", {
            card_id: cardId,
            data: JSON.stringify({ ...d, qrLink: getShareLink(cardId) }),
            updated_at: new Date().toISOString()
          });
          setSyncStatus("synced");
        } catch { setSyncStatus("error"); }
      }
      await new Promise(r => setTimeout(r, 400));
      setSaveStatus("saved");
    } catch { setSaveStatus("unsaved"); }
  }, [supabaseCfg, activeEmployeeId, sharedData]);

  const reset = ue.useCallback(() => {
    localStorage.removeItem(STORAGE_KEY);
    setSharedData(DEFAULT_DATA);
    setSaveStatus("saved");
  }, []);

  const connectSupabase = ue.useCallback((cfg) => {
    saveSupabaseConfig(cfg);
    setSupabaseCfg(cfg);
  }, []);

  const disconnectSupabase = ue.useCallback(() => {
    localStorage.removeItem(SUPABASE_CONFIG_KEY);
    setSupabaseCfg(null);
    setSyncStatus("idle");
  }, []);

  return { data, update, save, saveStatus, reset, syncStatus, supabaseCfg, connectSupabase, disconnectSupabase };
}

// ---- Image utilities ----
function readFileAsDataURL(file) {
  return new Promise((res,rej) => {
    if (!file) return rej(new Error("No file"));
    if (file.size > 3*1024*1024) return rej(new Error("文件最大3MB"));
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = () => rej(new Error("读取失败"));
    r.readAsDataURL(file);
  });
}
async function compressImage(dataUrl, maxW=600, q=0.82) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const sc = Math.min(maxW/img.width, 1);
      const c = document.createElement("canvas");
      c.width = img.width*sc; c.height = img.height*sc;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      res(c.toDataURL("image/jpeg", q));
    };
    img.src = dataUrl;
  });
}
async function handleUpload(file, cb, errCb) {
  try {
    const raw = await readFileAsDataURL(file);
    const comp = await compressImage(raw);
    cb(comp);
  } catch(e) { if(errCb) errCb(e.message); }
}

function getQRUrl(text, size=160) {
  if (!text) return "";
  return `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}&margin=4`;
}

function VideoFileUploader({value,onChange}) {
  const ref = ue.useRef();
  const [busy,setBusy] = ue.useState(false);
  async function handle(e) {
    const f = e.target.files?.[0]; if(!f) return;
    if(f.size > 50*1024*1024) { alert("视频最大 50MB"); return; }
    setBusy(true);
    const r = new FileReader();
    r.onload = ev => { onChange(ev.target.result); setBusy(false); };
    r.onerror = () => setBusy(false);
    r.readAsDataURL(f);
    e.target.value="";
  }
  return u.jsxs("div",{children:[
    u.jsx("input",{ref,type:"file",accept:"video/*",onChange:handle,style:{display:"none"}}),
    u.jsx("button",{onClick:()=>ref.current?.click(),style:{padding:"7px 14px",fontSize:12,background:"var(--c-primary-light)",border:"1px solid var(--c-primary)",borderRadius:"var(--radius)",color:"var(--c-primary)",cursor:"pointer"},children:busy?"上传中...":value?"更换视频文件":"选择视频文件（MP4等）"}),
    value&&u.jsxs("div",{style:{fontSize:11,color:"#057a55",marginTop:4},children:["✓ 视频已上传 ",u.jsx("button",{onClick:()=>onChange(""),style:{color:"#e11d48",background:"none",border:"none",cursor:"pointer",fontSize:11},children:"删除"})]}),
  ]});
}

function PreviewCard({data}) {
  const [lightbox,setLightbox] = ue.useState(null);
  const [copied,setCopied] = ue.useState(null);

  function copy(text) {
    try { navigator.clipboard.writeText(text); } catch { /* ignore */ }
    setCopied(text);
    setTimeout(()=>setCopied(null),1500);
  }

  const initials = (data.name||"AB").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const heroStyle = {background:"linear-gradient(160deg, var(--c-hero-from) 0%, var(--c-hero-to) 100%)",padding:"18px 12px 14px",textAlign:"center"};

  const qrAutoUrl = getQRUrl(data.qrLink||"https://ytfasteners.com/aimee", 120);

  function embedVideoUrl(raw) {
    if (!raw) return null;
    let m;
    m = raw.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/]+)/);
    if(m) return `https://www.youtube.com/embed/${m[1]}`;
    m = raw.match(/bilibili\.com\/video\/(BV\w+)/i);
    if(m) return `https://player.bilibili.com/player.html?bvid=${m[1]}&autoplay=0`;
    return raw;

  return u.jsxs("div",{style:{background:"#f0f2f5",fontFamily:"'Inter','Noto Sans SC',sans-serif"},children:[
    u.jsx(Lightbox,{src:lightbox,onClose:()=>setLightbox(null)}),

function ChangePasswordModal({supabaseCfg, username, onClose, onChanged}) {

    e.preventDefault();
    setError("");
    if (!oldPw || !newPw || !confirmPw) { setError("请填写所有字段"); return; }
    if (newPw.length < 6) { setError("新密码至少需要 6 位"); return; }
    if (newPw !== confirmPw) { setError("两次输入的新密码不一致"); return; }

    #card-wrap{width:100%;max-width:420px;background:#f0f2f5;position:relative;}

<style>

// ── Persistent localStorage cache (works fully offline after first visit) ──
function gtLoadCache() {
  try {
    const raw = localStorage.getItem(GT_CACHE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}
function gtSaveCache(cache) {
  try {
    localStorage.setItem(GT_CACHE_KEY, JSON.stringify(cache));
  } catch(e) {}
}
let gtPersistentCache = gtLoadCache();

function gtUpdateOnlineStatus() {
  gtIsOnline = navigator.onLine;
  const dot = document.getElementById('gt-status-dot');
  const text = document.getElementById('gt-status-text');
  const badge = document.getElementById('gt-badge');
  const fab = document.getElementById('gt-fab');
  if (dot && text) {
    if (gtIsOnline) {
      dot.classList.remove('offline');
      text.textContent = '在线翻译已就绪 · Google API';
    } else {
      dot.classList.add('offline');
      text.textContent = '离线模式 · 使用本地词典/缓存';
    }
  }
  if (badge && fab) {
    fab.classList.add('has-badge');
    badge.className = gtIsOnline ? '' : 'offline';
  }
}
window.addEventListener('online', gtUpdateOnlineStatus);
window.addEventListener('offline', gtUpdateOnlineStatus);

// Collect all translatable text nodes in card-root
function gtGetTextNodes() {
  const walker = document.createTreeWalker(
    document.getElementById('card-root') || document.body,
    NodeFilter.SHOW_TEXT,
    {
      acceptNode: function(node) {
        const p = node.parentElement;
        if (!p) return NodeFilter.FILTER_REJECT;
        const tag = p.tagName;
        if (['SCRIPT','STYLE','NOSCRIPT'].includes(tag)) return NodeFilter.FILTER_REJECT;
        if (p.closest('#gt-fab,#gt-dropdown,#gt-toast,.notranslate')) return NodeFilter.FILTER_REJECT;
        const t = node.textContent.trim();
        if (!t || t.length < 1) return NodeFilter.FILTER_SKIP;
        return NodeFilter.FILTER_ACCEPT;
      }
    }
  );
  const nodes = [];
  let n;
  while (n = walker.nextNode()) nodes.push(n);
  return nodes;
}

function gtSaveOriginals(nodes) {
  if (gtOrigTexts) return;
  gtOrigTexts = new Map();
  nodes.forEach(function(n){ gtOrigTexts.set(n, n.textContent); });
}

function gtRestoreOriginal() {
  if (!gtOrigTexts) return;
  gtOrigTexts.forEach(function(orig, node){
    try { node.textContent = orig; } catch(e){}
  });
}

// Look up offline dictionary (exact match on trimmed text)
function gtOfflineLookup(text, targetLang) {
  const trimmed = text.trim();
  const entry = GT_OFFLINE_DICT[trimmed];
  if (entry && entry[targetLang]) return entry[targetLang];
  return null;
}

// Translate array of strings via Google Translate unofficial API
async function gtTranslateBatchOnline(texts, targetLang) {
  const unique = [...new Set(texts.filter(t => t.trim()))];
  if (!unique.length) return {};
  const BATCH = 40;
  const result = {};
  for (let i = 0; i < unique.length; i += BATCH) {
    const chunk = unique.slice(i, i + BATCH);
    const params = new URLSearchParams();
    params.set('client', 'gtx');
    params.set('sl', 'zh-CN');
    params.set('tl', targetLang);
    params.set('dt', 't');
    chunk.forEach(function(t){ params.append('q', t); });
    try {
      const res = await fetch('https://translate.googleapis.com/translate_a/t?' + params.toString(), {signal: AbortSignal.timeout ? AbortSignal.timeout(6000) : undefined});
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      if (Array.isArray(data)) {
        data.forEach(function(item, idx){
          if (Array.isArray(item)) {
            result[chunk[idx]] = Array.isArray(item[0]) ? item[0][0] : (item[0] || chunk[idx]);
          } else {
            result[chunk[idx]] = item || chunk[idx];
          }
        });
      }
    } catch(err) {
      console.warn('GT online batch failed (will use offline fallback):', err);
      // mark as failed so caller knows to use offline dict
      chunk.forEach(function(t){ result[t] = null; });
    }
  }
  return result;
}

// Main translate function — hybrid: cache -> offline dict -> online API
async function gtTranslatePage(langCode) {
  if (gtTranslating) return;
  gtTranslating = true;
  gtSetSpinner(true);

  try {
    if (!langCode) {
      gtRestoreOriginal();
      gtCurrentLang = '';
      gtSetLabel('翻译语言');
      gtRenderList();
      gtShowToast('已恢复原文 ✓');
      return;
    }

    const nodes = gtGetTextNodes();
    gtSaveOriginals(nodes);
    const texts = nodes.map(function(n){ return n.textContent; });
    const uniqueTexts = [...new Set(texts)];

    if (!gtPersistentCache[langCode]) gtPersistentCache[langCode] = {};
    const langCache = gtPersistentCache[langCode];

    // Step 1: resolve from persistent cache + offline dict first (instant, works offline)
    const stillNeeded = [];
    uniqueTexts.forEach(function(t){
      if (langCache[t]) return; // already cached
      const offline = gtOfflineLookup(t, langCode);
      if (offline) { langCache[t] = offline; return; }
      stillNeeded.push(t);
    });

    let usedOnline = false;
    let onlineFailed = false;

    // Step 2: if online and there are uncached/untranslated terms, hit the API
    if (stillNeeded.length > 0) {
      if (navigator.onLine) {
        gtShowToast('正在在线翻译...');
        const translated = await gtTranslateBatchOnline(stillNeeded, langCode);
        let anySuccess = false;
        Object.keys(translated).forEach(function(orig){
          if (translated[orig]) {
            langCache[orig] = translated[orig];
            anySuccess = true;
            usedOnline = true;
          }
        });
        if (!anySuccess) onlineFailed = true;
      } else {
        onlineFailed = true;
      }
    }

    // Step 3: apply whatever we have (cache/offline/online); leave others as original
    nodes.forEach(function(node){
      const orig = node.textContent;
      const tr = langCache[orig];
      if (tr && tr !== orig) {
        try { node.textContent = tr; } catch(e){}
      }
    });

    // Persist cache for true offline support on next visits
    gtSaveCache(gtPersistentCache);

    gtCurrentLang = langCode;
    const lang = GT_LANGS.find(function(l){ return l.code === langCode; });
    gtSetLabel(lang ? lang.flag + ' ' + lang.name : langCode);
    gtRenderList();

    if (onlineFailed && stillNeeded.length > 0) {
      gtShowToast('⚠ 网络不可用，已用离线词典/缓存翻译常用内容');
    } else if (usedOnline) {
      gtShowToast('翻译完成 ✓ 已缓存，可离线查看');
    } else {
      gtShowToast('翻译完成 ✓（来自本地缓存）');
    }

  } catch(err) {
    console.error('Translation error:', err);
    gtShowToast('翻译出现问题，已应用可用的离线内容');
  } finally {
    gtTranslating = false;
    gtSetSpinner(false);
  }
}

// ── UI helpers ──
function gtSetSpinner(on) {
  const el = document.getElementById('gt-spinner');
  if (el) el.style.display = on ? 'block' : 'none';
}
function gtSetLabel(text) {
  const el = document.getElementById('gt-fab-label');
  if (el) el.textContent = text;
}
function gtShowToast(msg) {
  const t = document.getElementById('gt-toast');
  if (!t) return;
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.style.display='none'; }, 2400);
}

function gtRenderList(filter) {
  filter = (filter || '').toLowerCase();
  const list = document.getElementById('gt-lang-list');
  if (!list) return;
  list.innerHTML = '';
  const filtered = filter
    ? GT_LANGS.filter(function(l){ return l.name.toLowerCase().includes(filter) || l.code.includes(filter); })
    : GT_LANGS;
  filtered.forEach(function(lang){
    const div = document.createElement('div');
    div.className = 'gt-item' + (gtCurrentLang === lang.code ? ' active' : '');
    const cached = lang.code && gtPersistentCache[lang.code] && Object.keys(gtPersistentCache[lang.code]).length > 0;
    div.innerHTML = '<span class="gt-flag">' + lang.flag + '</span><span>' + lang.name + '</span>' + (cached ? '<span class="gt-cached" title="已缓存，可离线使用">●</span>' : '');
    div.onclick = function(){
      gtMenuOpen = false;
      document.getElementById('gt-dropdown').classList.remove('open');
      gtTranslatePage(lang.code);
    };
    list.appendChild(div);
  });
}
function gtFilterLangs(val){ gtRenderList(val); }

function toggleGtMenu() {
  gtMenuOpen = !gtMenuOpen;
  const dd = document.getElementById('gt-dropdown');
  dd.classList.toggle('open', gtMenuOpen);
  if (gtMenuOpen) {
    gtUpdateOnlineStatus();
    gtRenderList();
    setTimeout(function(){ const s = document.querySelector('.gt-search'); if(s) s.focus(); }, 50);
  }
}

document.addEventListener('click', function(e){

  if (fab && dd && !fab.contains(e.target) && !dd.contains(e.target)){
    gtMenuOpen = false;
    dd.classList.remove('open');
  }
});

<\/script>

function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object') Object.assign(e.style,v);
    else if(k==='className') e.className=v;
    else if(k.startsWith('on')&&typeof v==='function') e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='html') e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  [].concat(children||[]).forEach(c=>{
    if(c==null||c===false) return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}

// ═══════════════════════════════════════════════════════
// SMART TRANSLATE ENGINE
// WeChat/China: DOM-walk + MyMemory API (free, CORS-ok)
// Other browsers: Google Translate widget

var _isWechat = /MicroMessenger/i.test(navigator.userAgent);
var _isChinaBrowser = _isWechat || /QQ\/|UCBrowser|MQQBrowser|baiduboxapp/i.test(navigator.userAgent);

// Cache: { "zh|en|hello": "world" }
var _txCache = {};
var _txLang = "";
var _originalTexts = null; // WeakMap of textNode -> original text

// ── WECHAT / CHINA BROWSER: DOM-walk translation ──

function _collectTextNodes(root) {
  var nodes = [];
  var skip = new Set(["SCRIPT","STYLE","NOSCRIPT","TEXTAREA","INPUT","notranslate"]);
  function walk(node) {
    if (!node) return;
    if (node.nodeType === 1) { // element
      if (skip.has(node.tagName)) return;
      if (node.classList && node.classList.contains("notranslate")) return;
      if (node.closest && node.closest(".notranslate,#gt-fab,#gt-dropdown,#_bc_tx_status")) return;
      if (node.getAttribute && node.getAttribute("translate") === "no") return;
    }
    if (node.nodeType === 3) { // text
      var t = node.textContent.trim();
      if (t.length > 0) nodes.push(node);
      return;
    }
    var child = node.firstChild;
    while (child) { walk(child); child = child.nextSibling; }
  }
  walk(root || document.body);
  return nodes;
}

function _chunkArray(arr, size) {
  var chunks = [];
  for (var i = 0; i < arr.length; i += size) chunks.push(arr.slice(i, i + size));
  return chunks;
}

function _txTimeout(ms) {
  if (typeof AbortSignal !== "undefined" && AbortSignal.timeout) return AbortSignal.timeout(ms);
  return undefined;
}

function _txLangForProvider(lang, provider) {
  var map = {
    "zh-CN": {mymemory:"zh-CN", libre:"zh", lingva:"zh"},
    "zh": {mymemory:"zh-CN", libre:"zh", lingva:"zh"},
    "pt": {mymemory:"pt-PT", libre:"pt", lingva:"pt"},
    "uk": {mymemory:"uk", libre:"uk", lingva:"uk"}
  };
  return (map[lang] && map[lang][provider]) || lang;
}

function _sameTranslations(input, output) {
  if (!output || output.length !== input.length) return true;
  var changed = false;
  for (var i = 0; i < input.length; i++) {
    if ((output[i] || "").trim() && output[i].trim() !== input[i].trim()) changed = true;
  }
  return !changed;
}

// MyMemory free API - 500 chars/request, ~100 req/day/IP, no key needed
// Works from WeChat browser in China (HTTPS, no GFW block)
function _myMemoryTranslate(texts, fromLang, toLang) {
  // Join texts with a unique separator that survives translation
  var SEP = " |||SEP||| ";
  var joined = texts.join(SEP);
  if (joined.length > 450) {
    // Split into smaller chunks
    return Promise.all(texts.map(function(t) {
      return _myMemoryTranslate([t], fromLang, toLang).then(function(r){ return r[0]; });
    }));
  }
  var cacheKey = fromLang + "|" + toLang + "|" + joined;
  if (_txCache[cacheKey]) return Promise.resolve(_txCache[cacheKey].split(SEP.trim()).map(function(s){return s.trim();}));
  var url = "https://api.mymemory.translated.net/get?q=" + encodeURIComponent(joined) +
    "&langpair=" + _txLangForProvider(fromLang, "mymemory") + "|" + _txLangForProvider(toLang, "mymemory");
  return fetch(url, {mode:"cors"})
    .then(function(r){ return r.json(); })
    .then(function(data) {
      var translated = (data.responseData && data.responseData.translatedText) || joined;
      _txCache[cacheKey] = translated;
      return translated.split(SEP.trim()).map(function(s){return s.trim();});
    })
    .catch(function(){ return texts; }); // on error keep original
}

function _googleBatchTranslateForDom(texts, toLang) {
  var clean = texts.filter(Boolean);
  if (!clean.length) return Promise.resolve([]);
  var params = new URLSearchParams();
  params.set("client", "gtx");
  params.set("sl", "auto");
  params.set("tl", toLang);
  params.set("dt", "t");
  clean.forEach(function(t){ params.append("q", t); });
  return fetch("https://translate.googleapis.com/translate_a/t?" + params.toString(), {
    mode: "cors",
    signal: _txTimeout(5500)
  })
    .then(function(r){ if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
    .then(function(data){
      if (!Array.isArray(data)) return clean;
      return clean.map(function(orig, idx){
        var item = data[idx];
        if (Array.isArray(item)) return Array.isArray(item[0]) ? (item[0][0] || orig) : (item[0] || orig);
        return item || orig;
      });
    });
}

function _libreTranslate(texts, toLang) {
  var endpoints = [
    "https://translate.terraprint.co/translate",
    "https://libretranslate.de/translate"
  ];
  var target = _txLangForProvider(toLang, "libre");
  function one(endpoint, idx) {
    if (idx >= endpoints.length) return Promise.reject(new Error("LibreTranslate unavailable"));
    return Promise.all(texts.map(function(t){
      return fetch(endpoint, {
        method:"POST",
        mode:"cors",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({q:t,source:"auto",target:target,format:"text"}),
        signal:_txTimeout(6500)
      })
        .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
        .then(function(d){ return d.translatedText || t; });
    })).catch(function(){ return one(endpoints[idx+1], idx+1); });
  }
  return one(endpoints[0], 0);
}

function _lingvaTranslate(texts, toLang) {
  var target = _txLangForProvider(toLang, "lingva");
  var endpoints = [
    "https://lingva.ml/api/v1/auto/" + encodeURIComponent(target) + "/",
    "https://lingva.garudalinux.org/api/v1/auto/" + encodeURIComponent(target) + "/"
  ];
  function translateText(t, endpointIdx) {
    if (endpointIdx >= endpoints.length) return Promise.reject(new Error("Lingva unavailable"));
    return fetch(endpoints[endpointIdx] + encodeURIComponent(t), {mode:"cors", signal:_txTimeout(6500)})
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(function(d){ return d.translation || t; })
      .catch(function(){ return translateText(t, endpointIdx + 1); });
  }
  return Promise.all(texts.map(function(t){ return translateText(t, 0).catch(function(){ return t; }); }));
}

async function _smartDomTranslate(texts, toLang) {
  var clean = texts.map(function(t){ return (t || "").trim(); });
  var cacheKey = "smart|" + toLang + "|" + clean.join("\n");
  if (_txCache[cacheKey]) {
    try { return JSON.parse(_txCache[cacheKey]); } catch(e) {}
  }
  var providers = _isChinaBrowser
    ? [_myMemoryTranslate, _libreTranslate, _lingvaTranslate, _googleBatchTranslateForDom]
    : [_googleBatchTranslateForDom, _libreTranslate, _myMemoryTranslate, _lingvaTranslate];
  for (var i = 0; i < providers.length; i++) {
    try {
      var result = providers[i] === _myMemoryTranslate
        ? await providers[i](clean, "zh-CN", toLang)
        : await providers[i](clean, toLang);
      if (!_sameTranslations(clean, result)) {
        _txCache[cacheKey] = JSON.stringify(result);
        return result;
      }
    } catch(e) {}
  }
  return clean;
}

// Translate all visible text nodes on the page
async function _domTranslateTo(langCode) {
  if (!langCode) { _domRestoreOriginal(); return; }

  var statusEl = document.getElementById("_bc_tx_status");
  if (statusEl) { statusEl.textContent = "翻译中..."; statusEl.style.display = "block"; }

  var nodes = _collectTextNodes(document.body);
  if (!_originalTexts) {
    _originalTexts = new WeakMap();
    nodes.forEach(function(n){ _originalTexts.set(n, n.textContent); });
  } else {
    // Restore originals first, collect fresh
    _domRestoreOriginal();
    nodes = _collectTextNodes(document.body);
  }

  var texts = nodes.map(function(n){ return n.textContent.trim(); }).filter(Boolean);
  // Batch: 10 texts per API call
  var batches = _chunkArray(texts, 8);
  var allTranslated = [];
  for (var i = 0; i < batches.length; i++) {
    var result = await _smartDomTranslate(batches[i], langCode);
    allTranslated = allTranslated.concat(result);
  }

  // Apply translations
  var ti = 0;
  nodes.forEach(function(node) {
    var orig = node.textContent.trim();
    if (orig.length > 0 && ti < allTranslated.length) {
      _originalTexts.set(node, node.textContent);
      node.textContent = allTranslated[ti++] || orig;
    }
  });

  if (statusEl) { statusEl.textContent = "✓ 已翻译"; setTimeout(function(){ statusEl.style.display = "none"; }, 1500); }
}

function _domRestoreOriginal() {
  if (!_originalTexts) return;
  var nodes = _collectTextNodes(document.body);
  nodes.forEach(function(n) {
    var orig = _originalTexts.get(n);
    if (orig !== undefined) n.textContent = orig;
  });
}

function ensureEditorGoogleTranslate(){
  if (_isChinaBrowser) return;
  if (typeof document === "undefined") return;
  if (!document.getElementById("bizcard-google-translate")) {
    var host = document.createElement("div");
    host.id = "bizcard-google-translate";
    host.style.cssText = "position:absolute;left:-9999px;top:-9999px;width:0;height:0;overflow:hidden;";
    document.body.appendChild(host);
  }
  window.bizcardGoogleTranslateInit = function(){
    try {
      new google.translate.TranslateElement({
        pageLanguage:"zh-CN",
        includedLanguages:"zh-CN,en,ru,es,de,fr,ar,ja,ko,pt,tr,vi,id,it,nl,pl,sv,da,fi,th,ms,hi",
        layout:google.translate.TranslateElement.InlineLayout.SIMPLE,
        autoDisplay:false
      }, "bizcard-google-translate");
    } catch(e) {}
  };
  if (!document.querySelector("script[data-bizcard-google-translate]")) {
    var script = document.createElement("script");
    script.src = "https://translate.google.com/translate_a/element.js?cb=bizcardGoogleTranslateInit";
    script.async = true;
    script.dataset.bizcardGoogleTranslate = "1";
    document.head.appendChild(script);
  } else if (window.google && window.google.translate) {
    window.bizcardGoogleTranslateInit();
  }
}

function _googleDoTranslate(langCode, tries) {
  tries = tries || 0;
  if (!langCode) {
    document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
    document.cookie = "googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=" + location.hostname;
    window.location.reload();
    return;
  }
  var combo = document.querySelector(".goog-te-combo");
  if (combo) {
    combo.value = langCode;
    combo.dispatchEvent(new Event("change"));
    return;
  }
  if (tries < 25) {
    setTimeout(function(){ _googleDoTranslate(langCode, tries+1); }, 200);
  } else {
    document.cookie = "googtrans=/zh-CN/" + langCode + "; path=/; domain=" + location.hostname;
    document.cookie = "googtrans=/zh-CN/" + langCode + "; path=/";
    window.location.reload();
  }
}

// ── UNIFIED ENTRY POINT ──
async function doTranslatePage(langCode) {
  _txLang = langCode;
  if (!langCode) {
    _domRestoreOriginal();
    if (!_isChinaBrowser) {
      try { _googleDoTranslate(""); } catch(e) {}
    }
    return;
  }
  if (_isChinaBrowser) {
    await _domTranslateTo(langCode);
    return;
  }
  try {
    ensureEditorGoogleTranslate();
    _googleDoTranslate(langCode);
    setTimeout(function(){
      var translated = document.body.classList.contains("translated-ltr") || document.body.classList.contains("translated-rtl") || document.querySelector("iframe.goog-te-banner-frame");
      if (!translated) _domTranslateTo(langCode).catch(function(){});
    }, 2600);
  } catch(e) {
    await _domTranslateTo(langCode);
  }
}
